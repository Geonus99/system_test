{% extends 'detector/base.html' %}
{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap');

    :root {
        --bg: #0a0c10;
        --surface: #111318;
        --surface2: #1a1d24;
        --border: #232730;
        --accent-blue: #3b82f6;
        --accent-green: #22c55e;
        --accent-red: #ef4444;
        --text: #e2e8f0;
        --text-muted: #64748b;
        --mono: 'JetBrains Mono', monospace;
        --sans: 'Syne', sans-serif;
    }

    body { background: var(--bg); color: var(--text); }

    .monitor-wrap { padding: 24px; font-family: var(--sans); }

    .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
    }
    .top-bar h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin: 0; }
    .top-bar h1 span { color: var(--accent-blue); }
    .sys-time { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); }

    .main-grid {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 16px;
    }

    /* 뷰어 패널 */
    .viewer-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
    }
    .panel-label {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
    }
    .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: background 0.3s;
        flex-shrink: 0;
    }
    .dot.active { background: var(--accent-blue); box-shadow: 0 0 5px var(--accent-blue); animation: pulse 2s infinite; }
    .dot.error  { background: var(--accent-red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .status-tag {
        font-family: var(--mono);
        font-size: 0.55rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-muted);
    }
    .status-tag.on { background: rgba(59,130,246,0.1); border-color: var(--accent-blue); color: var(--accent-blue); }
    .status-tag.err { background: rgba(239,68,68,0.1); border-color: var(--accent-red); color: var(--accent-red); }

    .cam-body {
        position: relative;
        background: #000;
        flex: 1;
        min-height: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .cam-body video,
    .cam-body img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        position: absolute;
        inset: 0;
    }
    .cam-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text-muted);
        z-index: 1;
    }
    .cam-placeholder svg { opacity: 0.15; }
    .cam-placeholder span { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.05em; }
    .cam-placeholder.hidden { display: none; }

    .cam-info-bar {
        padding: 8px 14px;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 0.65rem;
        color: var(--text-muted);
        background: var(--surface2);
        min-height: 32px;
    }
    .cam-info-bar span { color: var(--text); }

    /* 사이드 패널 */
    .side-panel { display: flex; flex-direction: column; gap: 14px; }

    .side-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
    }
    .side-card-header {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .ctrl-row { display: flex; gap: 6px; align-items: center; }

    select.mini-select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-family: var(--mono);
        font-size: 0.6rem;
        border-radius: 3px;
        padding: 2px 5px;
        outline: none;
        cursor: pointer;
    }
    select.mini-select:focus { border-color: var(--accent-blue); }

    .load-btn {
        font-family: var(--mono);
        font-size: 0.6rem;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 3px;
        border: 1px solid var(--accent-blue);
        background: rgba(59,130,246,0.1);
        color: var(--accent-blue);
        cursor: pointer;
        transition: all 0.15s;
    }
    .load-btn:hover { background: rgba(59,130,246,0.2); }
    .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 검색 */
    .search-wrap { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .search-input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 5px 10px;
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--text);
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent-blue); }
    .search-input::placeholder { color: var(--text-muted); }

    /* CCTV 리스트 */
    .cctv-list-scroll {
        max-height: 480px;
        overflow-y: auto;
    }
    .cctv-list-scroll::-webkit-scrollbar { width: 4px; }
    .cctv-list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .cctv-item {
        padding: 9px 14px;
        border-bottom: 1px solid var(--border);
        border-left: 2px solid transparent;
        cursor: pointer;
        transition: background 0.12s;
    }
    .cctv-item:hover { background: var(--surface2); }
    .cctv-item.selected {
        border-left-color: var(--accent-blue);
        background: rgba(59,130,246,0.07);
    }
    .cctv-item-name {
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .cctv-item-sub {
        font-family: var(--mono);
        font-size: 0.58rem;
        color: var(--text-muted);
        margin-top: 2px;
    }

    .list-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 80px;
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--text-muted);
    }
    .list-count {
        font-family: var(--mono);
        font-size: 0.6rem;
        color: var(--text-muted);
        padding: 5px 14px;
        border-bottom: 1px solid var(--border);
    }
</style>

<div class="monitor-wrap">
    <div class="top-bar">
        <h1>ITS <span>API</span> 탐지</h1>
        <span class="sys-time" id="sysTime">--:--:--</span>
    </div>

    <div class="main-grid">
        <!-- 왼쪽: 영상 뷰어 -->
        <div class="viewer-panel">
            <div class="panel-header">
                <div class="panel-label">
                    <div class="dot" id="viewerDot"></div>
                    <span id="viewerName">선택된 CCTV 없음</span>
                </div>
                <span class="status-tag" id="viewerStatus">대기중</span>
            </div>

            <div class="cam-body" id="camBody">
                <div class="cam-placeholder" id="placeholder">
                    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
                        <path d="M15.75 10.5l4.72-4.72v12.44l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9A2.25 2.25 0 004.5 18.75z"/>
                    </svg>
                    <span>CCTV를 선택하세요</span>
                </div>
                <!-- HLS/RTSP 재생 영역 -->
                <video id="hlsPlayer" autoplay muted playsinline controls style="display:none;"></video>
            </div>

            <div class="cam-info-bar" id="camInfoBar">
                위치: <span id="infoRoad">—</span> &nbsp;|&nbsp; URL: <span id="infoUrl">—</span>
            </div>
        </div>

        <!-- 오른쪽: CCTV 목록 -->
        <div class="side-panel">
            <div class="side-card" style="flex:1;">
                <div class="side-card-header">
                    <span>ITS CCTV 목록</span>
                    <div class="ctrl-row">
                        <select class="mini-select" id="cctvType">
                            <option value="ex">고속도로</option>
                            <option value="its">일반도로</option>
                        </select>
                        <button class="load-btn" id="loadBtn" onclick="loadCctvList()">LOAD</button>
                    </div>
                </div>

                <div class="search-wrap">
                    <input type="text" class="search-input" id="searchInput"
                           placeholder="CCTV 이름 검색..." oninput="filterList()">
                </div>

                <div class="list-count" id="listCount" style="display:none;"></div>

                <div class="cctv-list-scroll" id="cctvList">
                    <div class="list-empty">LOAD 버튼을 눌러주세요</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- HLS.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.14/dist/hls.min.js"></script>

<script>
    // 시계
    function updateTime() {
        document.getElementById('sysTime').textContent =
            new Date().toLocaleTimeString('ko-KR', { hour12: false });
    }
    setInterval(updateTime, 1000);
    updateTime();

    let allCctvs = [];
    let currentHls = null;

    // ── CCTV 목록 로드 ──────────────────────────────────────
    async function loadCctvList() {
        const type = document.getElementById('cctvType').value;
        const listEl = document.getElementById('cctvList');
        const btn = document.getElementById('loadBtn');
        const countEl = document.getElementById('listCount');

        btn.disabled = true;
        btn.textContent = '...';
        listEl.innerHTML = '<div class="list-empty">불러오는 중...</div>';
        countEl.style.display = 'none';
        document.getElementById('searchInput').value = '';

        try {
            const res = await fetch(`/ai-detect/api/cctv/list?type=${type}&limit=100`);
            const data = await res.json();

            if (!data.ok || !data.cctvs.length) {
                listEl.innerHTML = '<div class="list-empty">데이터 없음</div>';
                return;
            }

            allCctvs = data.cctvs;
            renderList(allCctvs);
            countEl.style.display = 'block';
            countEl.textContent = `총 ${data.cctvs.length}개`;

        } catch (e) {
            listEl.innerHTML = `<div class="list-empty" style="color:var(--accent-red)">오류: ${e.message}</div>`;
        } finally {
            btn.disabled = false;
            btn.textContent = 'LOAD';
        }
    }

    // ── 목록 렌더링 ─────────────────────────────────────────
    function renderList(list) {
        const listEl = document.getElementById('cctvList');
        if (!list.length) {
            listEl.innerHTML = '<div class="list-empty">검색 결과 없음</div>';
            return;
        }
        listEl.innerHTML = '';
        list.forEach(cctv => {
            const item = document.createElement('div');
            item.className = 'cctv-item';
            item.dataset.url = cctv.url;
            item.innerHTML = `
                <div class="cctv-item-name" title="${cctv.name}">${cctv.name}</div>
                <div class="cctv-item-sub">${cctv.road || '도로명 없음'}</div>
            `;
            item.addEventListener('click', () => selectCctv(item, cctv));
            listEl.appendChild(item);
        });
    }

    // ── 검색 필터 ────────────────────────────────────────────
    function filterList() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        const filtered = q
            ? allCctvs.filter(c => c.name.toLowerCase().includes(q) || (c.road && c.road.toLowerCase().includes(q)))
            : allCctvs;
        renderList(filtered);
        document.getElementById('listCount').textContent = `${filtered.length} / ${allCctvs.length}개`;
    }

    // ── CCTV 선택 ────────────────────────────────────────────
    function selectCctv(el, cctv) {
        document.querySelectorAll('.cctv-item.selected').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');

        document.getElementById('viewerName').textContent = cctv.name;
        document.getElementById('infoRoad').textContent = cctv.road || '—';
        document.getElementById('infoUrl').textContent = cctv.url.length > 40
            ? cctv.url.slice(0, 40) + '...' : cctv.url;

        document.getElementById('placeholder').classList.add('hidden');
        document.getElementById('viewerDot').className = 'dot active';
        document.getElementById('viewerStatus').className = 'status-tag on';
        document.getElementById('viewerStatus').textContent = 'LIVE';

        playStream(cctv.url);
    }

    // ── 스트림 재생 ──────────────────────────────────────────
    function playStream(url) {
        const vid = document.getElementById('hlsPlayer');

        // 기존 HLS 인스턴스 제거
        if (currentHls) { currentHls.destroy(); currentHls = null; }

        vid.style.display = 'block';

        if (url.includes('.m3u8') || url.includes('hls')) {
            // HLS 스트림
            if (Hls.isSupported()) {
                currentHls = new Hls({ enableWorker: true });
                currentHls.loadSource(url);
                currentHls.attachMedia(vid);
                currentHls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) setError();
                });
            } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari 네이티브 HLS
                vid.src = url;
            } else {
                setError();
            }
        } else {
            // 직접 재생 시도 (mp4 등)
            vid.src = url;
            vid.onerror = () => setError();
        }

        vid.play().catch(() => {});
    }

    function setError() {
        document.getElementById('viewerDot').className = 'dot error';
        document.getElementById('viewerStatus').className = 'status-tag err';
        document.getElementById('viewerStatus').textContent = 'ERROR';
    }
</script>

{% endblock %}
